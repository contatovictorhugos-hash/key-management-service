version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: key-management-db
    environment:
      POSTGRES_DB: keymanagementdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keymanagementdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: key-management-app
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/keymanagementdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      APP_SECURITY_MASTER_KEY: ${APP_SECURITY_MASTER_KEY}

volumes:
  postgres_data:
